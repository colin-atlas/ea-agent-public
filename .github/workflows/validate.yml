name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-manifests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jsonschema CLI
        run: pip install 'jsonschema[format]'

      - name: Validate manifests
        run: ./scripts/validate-manifests.sh

      - name: Run validator tests
        run: ./tests/test-validator.sh

      - name: Run python tests
        run: ./tests/run-python-tests.sh
